        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],

                    <div class="loading">Memuat pelajaran...</div>
                </div>
            </div>

            <div class="input-area">
                <span class="prompt">user@aljabar-linear:~$</span>
                <span class="cursor">█</span>
            </div>
        </div>
    </div>

<li>Jika $\\vec{A} \\cdot \\vec{B} &lt; 0$ → sudut &gt; 90° (berlawanan arah)</li>

<ul>
<li>Menghitung sudut antara dua vektor</li>
<li>Memeriksa apakah dua vektor tegak lurus</li>
<li>Proyeksi satu vektor ke vektor lain</li>
</ul>`

<p>$$c_{ij} = \\sum_{k=1}^{n} a_{ik} \\times b_{kj}$$</p>`

<h4>Notasi:</h4>
<p>$$det(A) \\text{ atau } |A|$$</p>

<h4>Untuk Matriks 2×2:</h4>

<h4>Untuk Matriks 3×3 (Sarrus):</h4>
<p>$$det\\begin{bmatrix} a & b & c \\\\ d & e & f \\\\ g & h & i \\end{bmatrix} = aei + bfg + cdh - ceg - bdi - afh$$</p>

<h4>Interpretasi:</h4>

<h4>Contoh:</h4>

4x -  y = 2</code></pre>

<h4>Representasi Matriks (Ax = b):</h4>
<p>$$\\begin{bmatrix} 2 & 3 \\\\ 4 & -1 \\end{bmatrix} \\begin{bmatrix} x \\\\ y \\end{bmatrix} = \\begin{bmatrix} 8 \\\\ 2 \\end{bmatrix}$$</p>

<h4>Jenis Solusi:</h4>
<ul>
<li><strong>Solusi unik</strong>: Satu titik potong (determinan ≠ 0)</li>
<li><strong>Tidak ada solusi</strong>: Sistem tidak konsisten (garis sejajar)</li>
<li><strong>Tak hingga solusi</strong>: Sistem dependen (garis berimpit)</li>
</ul>

<h4>Metode Penyelesaian:</h4>
<ol>
<li><strong>Substitusi</strong>: Isolasi satu variabel, substitusi ke persamaan lain</li>
<li><strong>Eliminasi</strong>: Samakan koefisien, kurangkan persamaan</li>
<li><strong>Eliminasi Gauss</strong>: Ubah ke bentuk eselon baris</li>
<li><strong>Aturan Cramer</strong>: Gunakan determinan</li>
<li><strong>Invers Matriks</strong>: $x = A^{-1}b$</li>

<p><strong>Vektor Eigen (v)</strong>: Vektor yang arahnya <strong>tidak berubah</strong> setelah transformasi matriks (hanya berubah besarnya).</p>

                        content: `<h4>Langkah-langkah:</h4>
<ol>

<h4>Contoh:</h4>

<p>Langkah 2: Hitung determinan:</p>
<p>$$det(A - \\lambda I) = (3-\\lambda)(2-\\lambda) - (1)(0) = (3-\\lambda)(2-\\lambda)$$</p>

<h4>Untuk matriks 3×3:</h4>
<p>Persamaan karakteristik berupa polinomial derajat 3:</p>
<p>$$\\lambda^3 - tr(A)\\lambda^2 + c_1\\lambda - det(A) = 0$$</p>`

            'linear-independence': {

                    {
                        type: 'concept',
                        title: 'Apa itu Kemandirian Linear?',
                        content: `<p>Sekumpulan vektor <strong>linear independen</strong> (kemandirian linear) jika tidak ada vektor yang bisa ditulis sebagai kombinasi linear dari vektor lainnya.</p>

<h4>Definisi Formal:</h4>
<p>Vektor $v_1, v_2, ..., v_n$ linear independen jika:</p>
<p>$$c_1 v_1 + c_2 v_2 + ... + c_n v_n = 0$$</p>
<p>Hanya memiliki solusi trivial: $c_1 = c_2 = ... = c_n = 0$</p>

<h4>Jika Linear Dependen:</h4>
<p>Ada skalar $c_i$ yang tidak semua nol sehingga:</p>
<p>$$c_1 v_1 + c_2 v_2 + ... + c_n v_n = 0$$</p>

<h4>Contoh:</h4>
<ul>
<li>$v_1 = [1, 0]$, $v_2 = [0, 1]$ → <strong>Linear independen</strong></li>
<li>$v_1 = [1, 2]$, $v_2 = [2, 4]$ → <strong>Linear dependen</strong> ($v_2 = 2v_1$)</li>
</ul>

<h4>Cara Memeriksa:</h4>
<ol>
<li>Buat matriks dengan vektor-vektor sebagai kolom</li>
<li>Hitung determinan (untuk matriks persegi)</li>
<li>Jika det ≠ 0 → linear independen</li>
<li>Atau gunakan eliminasi Gauss → rank = jumlah vektor → independen</li>
</ol>

<h4>Kegunaan:</h4>
<ul>
<li>Menentukan basis ruang vektor</li>
<li>Memeriksa apakah sistem punya solusi unik</li>
<li>Mencari dimensi ruang vektor</li>
</ul>`

<h4>2. Matriks Diagonal</h4>

<p>$$L = \\begin{bmatrix} a & 0 & 0 \\\\ b & c & 0 \\\\ d & e & f \\end{bmatrix}$$</p>

<h4>7. Matriks Idempoten</h4>

<h4>Bentuk:</h4>
<p>$$Ax = 0$$</p>

<h4>Sifat-sifat:</h4>
<ul>
<li>Selalu memiliki <strong>solusi trivial</strong> ($x = 0$)</li>
<li>Jika det(A) ≠ 0 → hanya solusi trivial</li>
<li>Jika det(A) = 0 → tak hingga solusi</li>
</ul>

<h4>Solusi Non-Trivial:</h4>
<p>Jika ada solusi selain $x = 0$, maka:</p>
<ul>
<li>Solusi bisa di-scale (jika x solusi, maka cx juga solusi)</li>
<li>Himpunan semua solusi membentuk <strong>ruang nol</strong> (null space)</li>
<li>Dimensi ruang nol = n - rank(A)</li>
</ul>

<h4>Contoh:</h4>
<pre><code>x + 2y = 0
2x + 4y = 0</code></pre>
<p>Determinan = 0, sehingga ada tak hingga solusi.</p>
<p>Solusi: $x = -2t, y = t$ untuk semua $t \\in \\mathbb{R}$</p>

<h4>Kegunaan:</h4>
<ul>
<li>Mencari ruang nol matriks</li>
<li>Menentukan stabilitas sistem</li>
<li>Mencari vektor eigen (dari $(A - \\lambda I)v = 0$)</li>
</ul>`

            // RUANG VEKTOR
            'what-is-vector-space': {
                title: 'Apa itu Ruang Vektor?',
                sections: [
                    {
                        type: 'concept',
                        title: 'Definisi Ruang Vektor',
                        content: `<p><strong>Ruang vektor</strong> (vector space) adalah himpunan vektor yang memenuhi operasi penjumlahan vektor dan perkalian skalar.</p>

<h4>Aksioma Ruang Vektor:</h4>
<p>Untuk semua vektor $u, v, w$ dan skalar $c, d$:</p>
<ol>
<li>$u + v = v + u$ (komutatif)</li>
<li>$(u + v) + w = u + (v + w)$ (asosiatif)</li>
<li>Ada vektor nol: $v + 0 = v$</li>
<li>Ada vektor negatif: $v + (-v) = 0$</li>
<li>$c(u + v) = cu + cv$ (distributif)</li>
<li>$(c + d)v = cv + dv$</li>
<li>$c(dv) = (cd)v$</li>
<li>$1v = v$</li>
</ol>

<h4>Contoh Ruang Vektor:</h4>
<ul>
<li>$\\mathbb{R}^n$ = ruang vektor n-dimensi</li>
<li>$\\mathbb{R}^2$ = bidang kartesius</li>
<li>$\\mathbb{R}^3$ = ruang 3 dimensi</li>
<li>Himpunan semua matriks m×n</li>
<li>Himpunan semua polinomial derajat ≤ n</li>
</ul>

<h4>Bukan Ruang Vektor:</h4>
<ul>
<li>Himpunan vektor dengan komponen positif saja (tidak ada vektor negatif)</li>
<li>Himpunan vektor dengan $|v| = 1$ (tidak tertutup terhadap penjumlahan)</li>
</ul>`
                    }
                ]
            },

            'basis-dimension': {

                sections: [
                    {
                        type: 'concept',
                        title: 'Basis dan Dimensi',
                        content: `<h4>Basis:</h4>
<p><strong>Basis</strong> dari ruang vektor adalah himpunan vektor yang:</p>
<ol>
<li><strong>Linear independen</strong> (tidak ada yang redundan)</li>
<li><strong>Merentang</strong> (span) seluruh ruang vektor</li>
</ol>

<h4>Contoh Basis $\\mathbb{R}^2$:</h4>
<p>Basis standar: $\\{[1, 0], [0, 1]\\}$</p>
<p>Basis lain: $\\{[1, 1], [1, -1]\\}$ (juga valid!)</p>

<h4>Dimensi:</h4>
<p><strong>Dimensi</strong> = jumlah vektor dalam basis.</p>
<ul>
<li>$\\dim(\\mathbb{R}^2) = 2$</li>
<li>$\\dim(\\mathbb{R}^3) = 3$</li>
<li>$\\dim(\\mathbb{R}^n) = n$</li>
</ul>

<h4>Teorema:</h4>
<ul>
<li>Setiap basis memiliki jumlah vektor yang sama</li>
<li>Basis tidak unik, tapi dimensi unik</li>
<li>n vektor linear independen di $\\mathbb{R}^n$ membentuk basis</li>
</ul>

<h4>Cara Mencari Basis:</h4>
<ol>
<li>Buat matriks dengan vektor-vektor sebagai kolom</li>
<li>Eliminasi Gauss ke bentuk eselon baris</li>
<li>Kolom dengan pivot membentuk basis</li>
</ol>`
                    }
                ]
            },

            'column-row-space': {
                title: 'Ruang Kolom & Baris',
                sections: [
                    {
                        type: 'concept',
                        title: 'Ruang Kolom dan Ruang Baris',
                        content: `<h4>Ruang Kolom (Column Space):</h4>
<p><strong>Ruang kolom</strong> matriks A adalah span dari semua kolom A.</p>
<p>$$Col(A) = span\\{a_1, a_2, ..., a_n\\}$$</p>
<p>Dimensi ruang kolom = <strong>rank(A)</strong></p>

<h4>Ruang Baris (Row Space):</h4>
<p><strong>Ruang baris</strong> matriks A adalah span dari semua baris A.</p>
<p>$$Row(A) = Col(A^T)$$</p>
<p>Dimensi ruang baris = <strong>rank(A)</strong></p>

<h4>Teorema Fundamental:</h4>
<p>$$\\dim(Col(A)) = \\dim(Row(A)) = rank(A)$$</p>

<h4>Hubungan dengan Sistem Persamaan:</h4>
<p>Untuk sistem $Ax = b$:</p>
<ul>
<li>Sistem punya solusi ⟺ $b \\in Col(A)$</li>
<li>Sistem punya solusi unik ⟺ $rank(A) = n$ (jumlah kolom)</li>
</ul>

<h4>Contoh:</h4>
<p>$$A = \\begin{bmatrix} 1 & 2 & 3 \\\\ 2 & 4 & 6 \\\\ 3 & 6 & 9 \\end{bmatrix}$$</p>
<p>Semua kolom adalah multiplikasi dari kolom pertama.</p>
<p>$rank(A) = 1$, sehingga $\\dim(Col(A)) = 1$</p>
<p>Basis ruang kolom: $\\{[1, 2, 3]^T\\}$</p>`
                    }
                ]
            },

            'null-space': {
                title: 'Ruang Nol (Null Space)',
                sections: [
                    {
                        type: 'concept',
                        title: 'Apa itu Ruang Nol?',
                        content: `<p><strong>Ruang nol</strong> (null space) matriks A adalah himpunan semua vektor x yang memenuhi $Ax = 0$.</p>

<h4>Notasi:</h4>
<p>$$N(A) = \\{x \\in \\mathbb{R}^n : Ax = 0\\}$$</p>

<h4>Dimensi Ruang Nol:</h4>
<p>$$\\dim(N(A)) = n - rank(A)$$</p>
<p>Di mana n = jumlah kolom matriks A.</p>

<h4>Teorema Rank-Nolitas:</h4>
<p>$$rank(A) + nullity(A) = n$$</p>

<h4>Sifat-sifat:</h4>
<ul>
<li>Ruang nol selalu berisi vektor nol</li>
<li>Ruang nol adalah subruang dari $\\mathbb{R}^n$</li>
<li>Jika $\\dim(N(A)) = 0$ → hanya solusi trivial</li>
<li>Jika $\\dim(N(A)) > 0$ → ada tak hingga solusi</li>
</ul>

<h4>Contoh:</h4>
<p>$$A = \\begin{bmatrix} 1 & 2 \\\\ 2 & 4 \\end{bmatrix}$$</p>
<p>$rank(A) = 1$, $\\dim(N(A)) = 2 - 1 = 1$</p>
<p>Ruang nol: $N(A) = span\\{[-2, 1]^T\\}$</p>

<h4>Kegunaan:</h4>
<ul>
<li>Menentukan jumlah solusi sistem homogen</li>
<li>Mencari solusi umum sistem non-homogen</li>
<li>Analisis stabilitas sistem</li>
</ul>`
                    }
                ]
            },

            'subspaces': {
                title: 'Subruang',
                sections: [
                    {
                        type: 'concept',
                        title: 'Apa itu Subruang?',
                        content: `<p><strong>Subruang</strong> (subspace) dari ruang vektor V adalah himpunan bagian W yang juga merupakan ruang vektor.</p>

<h4>Syarat Subruang:</h4>
<p>W adalah subruang dari V jika:</p>
<ol>
<li><strong>Vektor nol</strong> ada di W</li>
<li><strong>Tertutup terhadap penjumlahan</strong>: $u, v \\in W \\Rightarrow u + v \\in W$</li>
<li><strong>Tertutup terhadap perkalian skalar</strong>: $v \\in W, c \\in \\mathbb{R} \\Rightarrow cv \\in W$</li>
</ol>

<h4>Contoh Subruang di $\\mathbb{R}^3$:</h4>
<ul>
<li>Garis melalui titik asal (dimensi 1)</li>
<li>Bidang melalui titik asal (dimensi 2)</li>
<li>$\\mathbb{R}^3$ sendiri (dimensi 3)</li>
<li>$\\{0\\}$ = ruang nol (dimensi 0)</li>

<p>$u_3 = v_3 - proj_{u_1}(v_3) - proj_{u_2}(v_3)$</p>

            const content = lessonContent[topicId];

                document.getElementById('lesson-content').innerHTML = '<div class="error">Pelajaran tidak ditemukan</div>';
                return;
            }

            let html = `<h2 class="lesson-title">${content.title}</h2>`;

            content.sections.forEach(section => {
                html += `<div class="section">`;
                html += `<h3 class="section-title">▸ ${section.title}</h3>`;
                html += `<div class="section-content">${section.content}</div>`;

                if (section.interactive) {
                    html += renderInteractive(section.interactive);
                }

                html += `</div>`;
            });

            document.getElementById('lesson-content').innerHTML = html;

            // Re-render MathJax
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        // Render interactive elements
        function renderInteractive(interactive) {
            let html = '<div class="interactive">';

            switch (interactive.type) {
                case 'vector_display':
                    html += '<div class="vector-display">';
                    interactive.vectors.forEach(v => {
                        html += `<div class="vector-item" style="color: ${v.color}">
                            <span class="vector-name">${v.name}</span> = <code>[${v.values.join(', ')}]</code>
                        </div>`;
                    });
                    html += '</div>';
                    break;

                case 'vector_calculator':
                    html += `
                        <div class="calculator">
                            <div class="calc-row">
                                <label>Vektor A:</label>
                                <input type="text" id="vec-a" placeholder="3, 4" value="3, 4">
                            </div>
                            <div class="calc-row">
                                <label>Vektor B:</label>
                                <input type="text" id="vec-b" placeholder="1, 2" value="1, 2">
                            </div>
                            <div class="calc-buttons">
                                <button onclick="calcVector('add')">A + B</button>
                                <button onclick="calcVector('subtract')">A - B</button>
                                <button onclick="calcVector('scalar')">2 × A</button>
                            </div>
                            <div class="calc-result" id="vector-result"></div>
                        </div>`;
                    break;

                case 'dot_product_calculator':
                    html += `
                        <div class="calculator">
                            <div class="calc-row">
                                <label>Vektor A:</label>
                                <input type="text" id="dot-a" placeholder="3, 4" value="3, 4">
                            </div>
                            <div class="calc-row">
                                <label>Vektor B:</label>
                                <input type="text" id="dot-b" placeholder="1, 2" value="1, 2">
                            </div>
                            <div class="calc-buttons">
                                <button onclick="calcDotProduct()">Hitung A · B</button>
                            </div>
                            <div class="calc-result" id="dot-result"></div>
                        </div>`;
                    break;

                case 'magnitude_calculator':
                    html += `
                        <div class="calculator">
                            <div class="calc-row">
                                <label>Vektor:</label>
                                <input type="text" id="mag-v" placeholder="3, 4" value="3, 4">
                            </div>
                            <div class="calc-buttons">
                                <button onclick="calcMagnitude()">|v| (Panjang)</button>
                                <button onclick="calcNormalize()">Normalisasi</button>
                            </div>
                            <div class="calc-result" id="mag-result"></div>
                        </div>`;
                    break;

                case 'cross_product_calculator':
                    html += `
                        <div class="calculator">
                            <div class="calc-row">
                                <label>Vektor A (3D):</label>
                                <input type="text" id="cross-a" placeholder="1, 2, 3" value="1, 2, 3">
                            </div>
                            <div class="calc-row">
                                <label>Vektor B (3D):</label>
                                <input type="text" id="cross-b" placeholder="4, 5, 6" value="4, 5, 6">
                            </div>
                            <div class="calc-buttons">
                                <button onclick="calcCrossProduct()">Hitung A × B</button>
                            </div>
                            <div class="calc-result" id="cross-result"></div>
                        </div>`;
                    break;

                case 'matrix_calculator':
                    html += `
                        <div class="calculator">
                            <div class="calc-row">
                                <label>Matriks A (baris dipisah ; kolom dipisah ,):</label>
                                <input type="text" id="mat-a" placeholder="1,2;3,4" value="1,2;3,4">
                            </div>
                            <div class="calc-row">
                                <label>Matriks B:</label>
                                <input type="text" id="mat-b" placeholder="5,6;7,8" value="5,6;7,8">
                            </div>
                            <div class="calc-buttons">
                                <button onclick="calcMatrix('add')">A + B</button>
                                <button onclick="calcMatrix('multiply')">A × B</button>
                            </div>
                            <div class="calc-result" id="matrix-result"></div>
                        </div>`;
                    break;

                case 'transpose_calculator':
                    html += `
                        <div class="calculator">
                            <div class="calc-row">
                                <label>Matriks:</label>
                                <input type="text" id="trans-m" placeholder="1,2,3;4,5,6" value="1,2,3;4,5,6">
                            </div>
                            <div class="calc-buttons">
                                <button onclick="calcTranspose()">Transpose (Aᵀ)</button>
                            </div>
                            <div class="calc-result" id="trans-result"></div>
                        </div>`;
                    break;

                case 'determinant_calculator':
                    html += `
                        <div class="calculator">
                            <div class="calc-row">
                                <label>Matriks 2×2:</label>
                                <input type="text" id="det-m" placeholder="1,2;3,4" value="1,2;3,4">
                            </div>
                            <div class="calc-buttons">
                                <button onclick="calcDeterminant()">Hitung det(A)</button>
                            </div>
                            <div class="calc-result" id="det-result"></div>
                        </div>`;
                    break;

                case 'inverse_calculator':
                    html += `
                        <div class="calculator">
                            <div class="calc-row">
                                <label>Matriks 2×2:</label>
                                <input type="text" id="inv-m" placeholder="1,2;3,4" value="1,2;3,4">
                            </div>
                            <div class="calc-buttons">
                                <button onclick="calcInverse()">Hitung A⁻¹</button>
                            </div>
                            <div class="calc-result" id="inv-result"></div>
                        </div>`;
                    break;

                case 'rank_calculator':
                    html += `
                        <div class="calculator">
                            <div class="calc-row">
                                <label>Matriks (baris ; kolom ,):</label>
                                <input type="text" id="rank-m" placeholder="1,2,3;4,5,6;7,8,9" value="1,2,3;4,5,6;7,8,9">
                            </div>
                            <div class="calc-buttons">
                                <button onclick="calcRank()">Hitung Rank</button>
                            </div>
                            <div class="calc-result" id="rank-result"></div>
                        </div>`;
                    break;

                case 'system_solver':
                    html += `
                        <div class="calculator">
                            <div class="calc-row">
                                <label>Koefisien A (baris ; kolom ,):</label>
                                <input type="text" id="sys-a" placeholder="1,2;3,-1" value="1,2;3,-1">
                            </div>
                            <div class="calc-row">
                                <label>Hasil b (pisahkan ,):</label>
                                <input type="text" id="sys-b" placeholder="5,1" value="5,1">
                            </div>
                            <div class="calc-buttons">
                                <button onclick="calcSystem()">Selesaikan Ax = b</button>
                            </div>
                            <div class="calc-result" id="sys-result"></div>
                        </div>`;
                    break;

                case 'gaussian_solver':
                    html += `
                        <div class="calculator">
                            <div class="calc-row">
                                <label>Koefisien A:</label>
                                <input type="text" id="gauss-a" placeholder="1,2,3;2,5,7;3,7,9" value="1,2,3;2,5,7;3,7,9">
                            </div>
                            <div class="calc-row">
                                <label>Hasil b:</label>
                                <input type="text" id="gauss-b" placeholder="9,21,27" value="9,21,27">
                            </div>
                            <div class="calc-buttons">
                                <button onclick="calcGaussian()">Eliminasi Gauss</button>
                            </div>
                            <div class="calc-result" id="gauss-result"></div>
                        </div>`;
                    break;

                case 'eigenvalue_calculator':
                    html += `
                        <div class="calculator">
                            <div class="calc-row">
                                <label>Matriks 2×2:</label>
                                <input type="text" id="eigen-m" placeholder="3,1;0,2" value="3,1;0,2">
                            </div>
                            <div class="calc-buttons">
                                <button onclick="calcEigenvalues()">Cari Nilai Eigen & Vektor Eigen</button>
                            </div>
                            <div class="calc-result" id="eigen-result"></div>
                        </div>`;
                    break;
            }

            html += '</div>';
            return html;
        }

        // Calculator functions
        function parseVector(str) {
            return str.split(',').map(s => parseFloat(s.trim()));
        }

        function parseMatrix(str) {
            return str.split(';').map(row => row.split(',').map(s => parseFloat(s.trim())));
        }

        async function apiCall(operation, params) {
            const response = await fetch('/api/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({operation, params})
            });
            return await response.json();
        }

        function showResult(elementId, result) {
            const el = document.getElementById(elementId);
            if (result.success) {
                if (Array.isArray(result.result)) {
                    el.innerHTML = `<div class="success"><pre>${JSON.stringify(result.result, null, 2)}</pre></div>`;
                } else if (result.eigenvalues) {
                    el.innerHTML = `<div class="success">
                        <p><strong>Nilai Eigen:</strong> ${result.eigenvalues.join(', ')}</p>
                        <p><strong>Vektor Eigen:</strong></p>
                        ${result.eigenvectors.map((v, i) => `<p>v${i+1} = ${v}</p>`).join('')}
                    </div>`;
                } else {
                    el.innerHTML = `<div class="success"><strong>Hasil:</strong> ${result.result}</div>`;
                }
            } else {
                el.innerHTML = `<div class="error">Error: ${result.error}</div>`;
            }
        }

        async function calcVector(op) {
            const v1 = parseVector(document.getElementById('vec-a').value);
            const v2 = parseVector(document.getElementById('vec-b').value);
            let result;
            if (op === 'add') {
                result = await apiCall('vector_add', {v1, v2});
            } else if (op === 'subtract') {
                result = await apiCall('vector_subtract', {v1, v2});
            } else if (op === 'scalar') {
                result = await apiCall('scalar_multiply', {scalar: 2, v: v1});
            }
            showResult('vector-result', result);
        }

        async function calcDotProduct() {
            const v1 = parseVector(document.getElementById('dot-a').value);
            const v2 = parseVector(document.getElementById('dot-b').value);
            const result = await apiCall('dot_product', {v1, v2});
            showResult('dot-result', result);
        }

        async function calcMagnitude() {
            const v = parseVector(document.getElementById('mag-v').value);
            const result = await apiCall('vector_magnitude', {v});
            showResult('mag-result', result);
        }

        async function calcNormalize() {
            const v = parseVector(document.getElementById('mag-v').value);
            const result = await apiCall('vector_normalize', {v});
            showResult('mag-result', result);
        }

        async function calcCrossProduct() {
            const v1 = parseVector(document.getElementById('cross-a').value);
            const v2 = parseVector(document.getElementById('cross-b').value);
            const result = await apiCall('cross_product', {v1, v2});
            showResult('cross-result', result);
        }

        async function calcMatrix(op) {
            const m1 = parseMatrix(document.getElementById('mat-a').value);
            const m2 = parseMatrix(document.getElementById('mat-b').value);
            let result;
            if (op === 'add') {
                result = await apiCall('matrix_add', {m1, m2});
            } else if (op === 'multiply') {
                result = await apiCall('matrix_multiply', {m1, m2});
            }
            showResult('matrix-result', result);
        }

        async function calcTranspose() {
            const m = parseMatrix(document.getElementById('trans-m').value);
            const result = await apiCall('matrix_transpose', {m});
            showResult('trans-result', result);
        }

        async function calcDeterminant() {
            const m = parseMatrix(document.getElementById('det-m').value);
            const result = await apiCall('matrix_determinant', {m});
            showResult('det-result', result);
        }

        async function calcInverse() {
            const m = parseMatrix(document.getElementById('inv-m').value);
            const result = await apiCall('matrix_inverse', {m});
            showResult('inv-result', result);
        }

        async function calcRank() {
            const m = parseMatrix(document.getElementById('rank-m').value);
            const result = await apiCall('matrix_rank', {m});
            showResult('rank-result', result);
        }

        async function calcSystem() {
            const A = parseMatrix(document.getElementById('sys-a').value);
            const b = parseVector(document.getElementById('sys-b').value);
            const result = await apiCall('solve_system', {A, b});
            showResult('sys-result', result);
        }

        async function calcGaussian() {
            const A = parseMatrix(document.getElementById('gauss-a').value);
            const b = parseVector(document.getElementById('gauss-b').value);
            const result = await apiCall('solve_system', {A, b});
            showResult('gauss-result', result);
        }

        async function calcEigenvalues() {
            const m = parseMatrix(document.getElementById('eigen-m').value);
            const result = await apiCall('eigenvalues', {m});
            showResult('eigen-result', result);
        }

        // Initialize
        renderLesson();
    </script>
</body>
</html>
